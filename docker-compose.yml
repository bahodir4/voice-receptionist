version: '3.9'

# ── Root .env is loaded automatically by docker-compose ──────────────────────
# Copy .env.example → .env and fill in your values before running.
# MongoDB is NOT run locally — supply your Atlas (or other) URI in backend/.env.

services:

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Agent Worker ───────────────────────────────────────────────────────────
  agent:
    build:
      context: ./backend
      dockerfile: agent.Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      backend:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-8000}}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
